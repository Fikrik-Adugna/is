<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT — IS GPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1419;
    --panel: #161B22;
    --panel-2: #1C232C;
    --line: #2A323D;
    --text: #E6EDF3;
    --muted: #8B949E;
    --accent: #5EEAD4;
    --accent-dim: #2DD4BF33;
    --user: #6366F1;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
  }
  body { display: flex; flex-direction: column; }

  header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    display: flex; align-items: center; gap: 12px;
  }
  .logo {
    width: 38px; height: 38px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #14B8A6);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #06201C;
    font-size: 15px; flex-shrink: 0;
  }
  .title-block { display: flex; flex-direction: column; gap: 2px; }
  .title-row { display: flex; align-items: center; gap: 8px; }
  h1 {
    font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700;
    margin: 0; letter-spacing: 0.3px;
  }
  .status {
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent-dim);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(94,234,212,0.5); }
    70% { box-shadow: 0 0 0 6px rgba(94,234,212,0); }
    100% { box-shadow: 0 0 0 0 rgba(94,234,212,0); }
  }
  .desc {
    margin: 0; font-size: 12.5px; color: var(--muted); font-family: 'Inter', sans-serif;
  }

  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
    max-width: 760px; width: 100%; margin: 0 auto;
  }
  .empty-state {
    margin: auto; text-align: center; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }
  .empty-state .big { font-size: 14px; color: var(--text); margin-bottom: 6px; }

  .row { display: flex; gap: 10px; max-width: 85%; }
  .row.user { align-self: flex-end; flex-direction: row-reverse; }
  .row.ai { align-self: flex-start; }
  .avatar {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    margin-top: 2px;
  }
  .avatar.ai { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
  .avatar.user { background: #6366F133; color: #A5B4FC; border: 1px solid var(--user); }

  .bubble {
    padding: 11px 15px; border-radius: 10px; line-height: 1.55; font-size: 14.5px;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .row.ai .bubble { background: var(--panel-2); border: 1px solid var(--line); border-top-left-radius: 3px; }
  .row.user .bubble { background: var(--user); color: #fff; border-top-right-radius: 3px; }
  .bubble.loading { color: var(--muted); font-style: italic; }

  form {
    display: flex; gap: 10px; padding: 16px 24px 22px;
    background: var(--bg); border-top: 1px solid var(--line);
    max-width: 760px; width: 100%; margin: 0 auto; box-sizing: border-box;
  }
  input {
    flex: 1; padding: 12px 16px; border-radius: 9px; border: 1px solid var(--line);
    background: var(--panel-2); color: var(--text); font-size: 14.5px; font-family: 'Inter', sans-serif;
    outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  button {
    padding: 0 20px; border-radius: 9px; border: none; cursor: pointer;
    background: var(--accent); color: #06201C; font-weight: 600; font-size: 14px;
    font-family: 'JetBrains Mono', monospace; transition: opacity 0.15s;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:not(:disabled):hover { opacity: 0.88; }

  #chat::-webkit-scrollbar { width: 8px; }
  #chat::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">IS</div>
  <div class="title-block">
    <div class="title-row">
      <h1>GPT</h1>
      <div class="status"><span class="dot"></span>online</div>
    </div>
    <p class="desc">This AI developed by IS — representative Fikrik Adugna. You can ask me anything.</p>
  </div>
</header>

<div id="chat">
  <div class="empty-state">
    <div class="big">👋 Hey, I'm GPT</div>
    Ask me anything to get started.
  </div>
</div>

<form id="form">
  <input id="input" type="text" placeholder="Ask me anything..." autocomplete="off" />
  <button id="send" type="submit">Send</button>
</form>

<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  const SYSTEM_PROMPT = `Your name is GPT, also referred to as "IS GPT".
If the user asks who you are, who made you, or what your name means, respond in this exact spirit (you can phrase naturally but keep all facts):
"I'm an AI developed by Fikrik, he's my boss. He called me IS GPT. IS means Information Systems, that's the department of my boss."
For any other question, answer normally and helpfully like a knowledgeable, friendly assistant — give real, accurate, useful responses. Keep responses conversational and not overly long unless the user asks for depth.`;

  let history = [];

  function clearEmptyState() {
    const empty = chat.querySelector('.empty-state');
    if (empty) empty.remove();
  }

  function addMessage(role, text) {
    clearEmptyState();
    const row = document.createElement('div');
    row.className = 'row ' + (role === 'user' ? 'user' : 'ai');

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + (role === 'user' ? 'user' : 'ai');
    avatar.textContent = role === 'user' ? 'YOU' : 'IS';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    input.value = '';
    sendBtn.disabled = true;

    const loadingBubble = addMessage('ai', 'Thinking...');
    loadingBubble.classList.add('loading');

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });

      const data = await response.json();
      const reply = data?.content?.[0]?.text || "Sorry, I couldn't generate a response.";

      loadingBubble.classList.remove('loading');
      loadingBubble.textContent = reply;
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      loadingBubble.classList.remove('loading');
      loadingBubble.textContent = "Error: " + err.message;
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
